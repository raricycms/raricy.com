{% extends 'base.html' %}
{% block title %}超级井字棋 - 聪明山{% endblock %}

{% block content %}
<div class="uttt-page">
  <div class="container" style="display: flex; flex-direction: column; align-items: center;">
    <a href="{{ url_for('game.menu') }}" class="uttt-back">&larr; 返回玩具</a>

    <div class="uttt-container">
      <h1 class="uttt-title">超级井字棋</h1>
      <div class="uttt-status" id="status-display"></div>
      <div class="uttt-board" id="super-board"></div>
      <div class="uttt-controls">
        <button class="uttt-btn uttt-btn--restart" id="restart-button">重新开始</button>
        <button class="uttt-btn uttt-btn--undo" id="undo-button">悔棋</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ static_url('js/game/utictactoe.js') }}"></script>
{% endblock %}
