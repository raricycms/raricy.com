{% extends 'base.html' %}
{% block title %}立方棋 - 聪明山{% endblock %}

{% block content %}
<div class="cubettt-page">
  <a href="{{ url_for('game.menu') }}" class="cubettt-back">&larr; 返回玩具</a>
  <div class="cubettt-info">
    <div class="cubettt-info__winner" id="winnerMessage"></div>
    <div class="cubettt-info__draw" id="drawMessage"></div>
    <div class="cubettt-info__player" id="currentPlayer">当前玩家: 红方</div>
    <div class="cubettt-info__row">红方棋子: <span id="redCount">0</span></div>
    <div class="cubettt-info__row">蓝方棋子: <span id="blueCount">0</span></div>
    <div class="cubettt-info__row">总步数: <span id="totalMoves">0</span> / 64</div>
    <div class="cubettt-info__actions">
      <button class="cubettt-btn cubettt-btn--undo" id="undoButton" disabled>悔棋</button>
      <button class="cubettt-btn" onclick="resetGame()">重新开始</button>
    </div>
  </div>

  <div class="cubettt-controls">
    <div class="cubettt-controls__title">操作说明:</div>
    <div>• 拖拽/滑动旋转视角</div>
    <div>• 点击/轻触下棋</div>
    <div>• A/S/D键爆炸视图</div>
    <div>• 四子连线获胜</div>
    <div>• 绿框显示最后一步</div>
    <div>• 64步无胜负为平局</div>
    <div class="cubettt-controls__explode">
      <div class="cubettt-controls__title">手机端爆炸视图:</div>
      <button class="cubettt-btn cubettt-btn--toggle" id="btnExplodeZ" aria-pressed="false" title="键盘 A">Z轴(A)</button>
      <button class="cubettt-btn cubettt-btn--toggle" id="btnExplodeY" aria-pressed="false" title="键盘 S">Y轴(S)</button>
      <button class="cubettt-btn cubettt-btn--toggle" id="btnExplodeX" aria-pressed="false" title="键盘 D">X轴(D)</button>
    </div>
  </div>

  <div class="cubettt-scene" id="container">
    <div class="cubettt-system" id="cubeSystem"></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ static_url('js/game/cubetictactoe.js') }}"></script>
{% endblock %}
