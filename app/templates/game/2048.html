{% extends 'base.html' %}
{% block title %}2048 - 聪明山{% endblock %}

{% block content %}
<div class="game-2048-page">
    <div class="container">
        <a href="{{ url_for('game.menu') }}" class="game-2048-back">&larr; 返回玩具</a>

        <div class="game-2048-header">
            <h1 class="game-2048-header__title">2048</h1>
            <div class="game-2048-scores">
                <div class="game-2048-score-box">
                    <span class="game-2048-score-box__label">分数</span>
                    <span class="game-2048-score-box__value" id="score">0</span>
                </div>
                <div class="game-2048-score-box">
                    <span class="game-2048-score-box__label">最佳</span>
                    <span class="game-2048-score-box__value" id="best">0</span>
                </div>
            </div>
        </div>

        <p class="game-2048-desc">用方向键或滑动合并相同的数字，拼出 <strong>2048</strong>！</p>

        <div class="game-2048-board-wrap" id="board-wrap">
            <div class="game-2048-board" id="board"></div>
        </div>

        <div class="game-2048-actions">
            <button class="game-2048-btn" id="btn-new" type="button">新游戏</button>
            <button class="game-2048-btn game-2048-btn--secondary" id="btn-undo" type="button">悔棋</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ static_url('js/game/2048.js') }}"></script>
{% endblock %}
