{% extends 'base.html' %}
{% block title %}四子棋 - 聪明山{% endblock %}

{% block content %}
<div class="connect4-page">
  <div class="container" style="display: flex; flex-direction: column; align-items: center;">
    <a href="{{ url_for('game.menu') }}" class="connect4-back">&larr; 返回玩具</a>

    <div class="connect4-container">
      <div class="connect4-winner-announcement" id="winner-announcement">
        <div id="winner-text"></div>
        <button class="connect4-btn connect4-btn--reset" onclick="resetGame()" style="margin-top: 15px; font-size: 14px; padding: 8px 16px;">再来一局</button>
      </div>

      <div class="connect4-mode-selector">
        <div class="connect4-mode-option">
          <input type="radio" id="normal-mode" name="game-mode" value="normal" checked>
          <label for="normal-mode">普通模式</label>
        </div>
        <div class="connect4-mode-option">
          <input type="radio" id="obstacle-mode" name="game-mode" value="obstacle">
          <label for="obstacle-mode">障碍模式</label>
        </div>
        <div class="connect4-mode-option">
          <input type="radio" id="blind-mode" name="game-mode" value="blind">
          <label for="blind-mode">盲棋模式</label>
        </div>
        <div class="connect4-mode-option">
          <input type="radio" id="blind2-mode" name="game-mode" value="blind2">
          <label for="blind2-mode">盲棋模式2</label>
        </div>
      </div>

      <div class="connect4-info">
        <div class="connect4-info__player">
          当前玩家: <span id="current-player-color">红色</span>
        </div>
        <div class="connect4-info__status" id="game-status"></div>
        <div class="connect4-controls">
          <button class="connect4-btn connect4-btn--undo" id="undo-btn" onclick="undoMove()">悔棋</button>
          <button class="connect4-btn connect4-btn--reset" onclick="resetGame()">重新开始</button>
        </div>
      </div>

      <div class="connect4-obstacle-phase" id="obstacle-phase"></div>
      <div class="connect4-keyboard-hint">按数字键 1-7 可在对应列落子</div>

      <div class="connect4-board-wrap">
        <div class="connect4-column-numbers">
          <div class="connect4-column-number">1</div>
          <div class="connect4-column-number">2</div>
          <div class="connect4-column-number">3</div>
          <div class="connect4-column-number">4</div>
          <div class="connect4-column-number">5</div>
          <div class="connect4-column-number">6</div>
          <div class="connect4-column-number">7</div>
        </div>
        <div class="connect4-board" id="board"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ static_url('js/game/connect4.js') }}"></script>
{% endblock %}
