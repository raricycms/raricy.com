{% extends "base.html" %}

{% block title %}{{ title }} - 互动小说{% endblock %}

{% block content %}
<div class="story-cattca">
  <div class="story-cattca__header">
    <h2>{{ title }}</h2>
  </div>

  <div class="story-cattca__game">
    <div class="story-cattca__output" id="output"></div>
    <div class="story-cattca__choices" id="choices"></div>
    <div class="story-cattca__log" id="log"></div>
  </div>
</div>

<script type="application/json" id="story-content">{{ content|tojson|safe }}</script>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
<script>
  if (!window.marked) {
    document.write('<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"><\\/script>');
  }
</script>
<script type="module">
  import { CattcaInterpreter } from "{{ url_for('static', filename='js/cattca.js') }}";

  try {
    if (typeof marked.setOptions === 'function') {
      marked.setOptions({ breaks: true, gfm: true, sanitize: false, smartLists: true, smartypants: false });
    } else if (typeof marked.use === 'function') {
      marked.use({ breaks: true, gfm: true, sanitize: false, smartLists: true, smartypants: false });
    }
  } catch (e) { console.warn('marked config error:', e); }

  var outputDiv = document.querySelector('#output');
  var logDiv = document.querySelector('#log');
  var choicesDiv = document.querySelector('#choices');

  var currentSegment = null;
  var segmentCount = 0;

  function renderMarkdown(txt) {
    try {
      if (typeof marked.parse === 'function') return marked.parse(txt);
      if (typeof marked === 'function') return marked(txt);
      throw new Error('marked API not found');
    } catch (e) {
      console.error('Markdown error:', e);
      return txt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\r\n|\n/g, '<br>');
    }
  }

  function appendOutput(txt) {
    var html = renderMarkdown(txt);
    if (!currentSegment) {
      currentSegment = document.createElement('div');
      currentSegment.className = 'story-cattca__segment';

      var header = document.createElement('div');
      header.className = 'story-cattca__segment-header';
      header.onclick = function() { toggleSegment(header); };

      var title = document.createElement('span');
      title.className = 'story-cattca__segment-title';
      title.textContent = '段落 ' + (++segmentCount);

      var icon = document.createElement('span');
      icon.className = 'story-cattca__segment-toggle';
      icon.textContent = '▼';

      header.appendChild(title);
      header.appendChild(icon);

      var body = document.createElement('div');
      body.className = 'story-cattca__segment-body';
      body.innerHTML = html;

      currentSegment.appendChild(header);
      currentSegment.appendChild(body);
      outputDiv.appendChild(currentSegment);

      setTimeout(function() {
        if (currentSegment) {
          currentSegment.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 10);
    } else {
      var body = currentSegment.querySelector('.story-cattca__segment-body');
      body.innerHTML = body.innerHTML + html;
    }
  }

  function startNewSegment() {
    if (currentSegment) {
      currentSegment.querySelector('.story-cattca__segment-body').classList.add('collapsed');
    }
    currentSegment = null;
  }

  window.toggleSegment = function(header) {
    var segment = header.parentElement;
    var body = segment.querySelector('.story-cattca__segment-body');
    var icon = header.querySelector('.story-cattca__segment-toggle');
    if (body.classList.contains('collapsed')) {
      body.classList.remove('collapsed');
      icon.textContent = '▲';
    } else {
      body.classList.add('collapsed');
      icon.textContent = '▼';
    }
  };

  function appendLog(txt) {
    logDiv.textContent += txt + '\n';
  }

  function getChoice(options) {
    return new Promise(function(resolve) {
      choicesDiv.innerHTML = '';
      options.forEach(function(opt) {
        var btn = document.createElement('button');
        btn.textContent = opt;
        btn.onclick = function() {
          choicesDiv.innerHTML = '';
          startNewSegment();
          resolve(opt);
        };
        choicesDiv.appendChild(btn);
      });
    });
  }

  function getInput(promptText) {
    return new Promise(function(resolve) {
      var area = document.createElement('div');
      area.className = 'story-cattca__input-area';

      var label = document.createElement('label');
      label.textContent = promptText || '请输入:';

      var input = document.createElement('input');
      input.type = 'text';

      var btn = document.createElement('button');
      btn.textContent = '确定';

      area.appendChild(label);
      area.appendChild(input);
      area.appendChild(btn);
      outputDiv.appendChild(area);
      input.focus();

      var handleSubmit = function() {
        var value = input.value;
        outputDiv.removeChild(area);
        startNewSegment();
        resolve(value);
      };

      btn.onclick = handleSubmit;
      input.onkeypress = function(e) {
        if (e.key === 'Enter') handleSubmit();
      };
    });
  }

  var interpreter = new CattcaInterpreter(appendOutput, appendLog, getInput, getChoice);
  var storyEl = document.getElementById('story-content');
  var story = storyEl ? JSON.parse(storyEl.textContent) : '';
  interpreter.load(story);
  interpreter.run();
</script>
{% endblock %}
