{% extends "base.html" %}

{% block title %}故事 - 聪明山{% endblock %}

{% block content %}
<section class="story-hero">
  <div class="container">
    <h1>故事</h1>
    <p>这里有一些故事，希望你喜欢</p>
  </div>
</section>

<div class="container">
  <div class="story-grid">
    {% for batch in batches %}
    <div class="story-card">
      <a href="/story/{{ batch.id }}" class="story-card__title">{{ batch.name }}</a>
      <p class="story-card__desc">{{ batch.description }}</p>
      <div class="story-card__meta">
        <span class="story-card__badge">{{ batch.story_count }} 篇</span>
        <a href="/story/{{ batch.id }}" class="story-card__btn">开始阅读</a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
