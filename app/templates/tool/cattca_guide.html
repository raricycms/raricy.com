{% extends "base.html" %}

{% block title %}Cattca 语法指南 - 聪明山{% endblock %}

{% block extra_css %}
<style>
  .guide {
    padding: 2rem 0;
    max-width: 820px;
    margin: 0 auto;
  }

  .guide__back {
    color: var(--color-text-secondary);
    text-decoration: none;
    font-size: 0.875rem;
    display: inline-block;
    margin-bottom: 2rem;
    transition: color 0.2s ease;
  }

  .guide__back:hover {
    color: var(--color-brand-primary);
  }

  .guide__content {
    background: var(--color-background-card);
    border: 1px solid var(--color-border);
    border-radius: 0.5rem;
    padding: 2.5rem;
    color: var(--color-text-primary);
    line-height: 1.8;
    font-size: 0.95rem;
  }

  .guide__content h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--color-brand-primary);
  }

  .guide__content h2 {
    font-size: 1.4rem;
    font-weight: 600;
    margin: 2.5rem 0 1rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--color-border);
  }

  .guide__content h3 {
    font-size: 1.15rem;
    font-weight: 600;
    margin: 1.75rem 0 0.75rem 0;
  }

  .guide__content p {
    margin: 0.75rem 0;
  }

  .guide__content code {
    background: var(--color-background-page);
    padding: 0.15rem 0.35rem;
    border-radius: 3px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 0.875em;
    color: var(--color-warning-primary);
  }

  .guide__content pre {
    background: var(--color-background-page);
    padding: 1rem 1.25rem;
    border-radius: 0.375rem;
    overflow-x: auto;
    margin: 1rem 0;
    border-left: 3px solid var(--color-brand-primary);
    font-size: 0.875rem;
    line-height: 1.6;
  }

  .guide__content pre code {
    background: none;
    padding: 0;
    color: var(--color-text-primary);
    font-size: inherit;
  }

  .guide__content blockquote {
    border-left: 3px solid var(--color-brand-primary);
    margin: 1rem 0;
    padding: 0.5rem 1rem;
    background: var(--color-background-page);
    color: var(--color-text-secondary);
    border-radius: 0 0.25rem 0.25rem 0;
  }

  .guide__content ul, .guide__content ol {
    margin: 0.75rem 0;
    padding-left: 1.75rem;
  }

  .guide__content li {
    margin: 0.35rem 0;
  }

  .guide__content table {
    border-collapse: collapse;
    width: 100%;
    margin: 1rem 0;
    font-size: 0.9rem;
  }

  .guide__content th, .guide__content td {
    border: 1px solid var(--color-border);
    padding: 0.5rem 0.75rem;
    text-align: left;
  }

  .guide__content th {
    background: var(--color-background-page);
    font-weight: 600;
  }

  .guide__content strong {
    color: var(--color-text-primary);
  }

  .guide__content a {
    color: var(--color-brand-primary);
  }

  .guide__content hr {
    border: none;
    border-top: 1px solid var(--color-border);
    margin: 2rem 0;
  }

  @media (max-width: 768px) {
    .guide__content {
      padding: 1.5rem;
    }
    .guide__content h1 {
      font-size: 1.6rem;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="guide container">
  <a href="{{ url_for('tool.cattca_page') }}" class="guide__back">← 返回 Cattca 编辑器</a>
  <div class="guide__content">
    {{ content | safe }}
  </div>
</div>
{% endblock %}
