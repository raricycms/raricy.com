{% extends "base.html" %}
{% block title %}403 禁止访问 · 聪明山{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-wrap">
    <p class="error-code">403</p>
    <h1 class="error-title">禁止访问</h1>
    <p class="error-message">抱歉，您没有足够的权限访问此页面。</p>
    <p class="error-hint">可能是该内容需要特定权限，或者您的账户尚未登录。登录后再试，或联系网站管理员。</p>

    <div class="error-actions">
      <a href="{{ url_for('auth.login') }}" class="btn btn--primary"><span class="icon icon-person-circle"></span>去登录</a>
      <a href="{{ url_for('home.index') }}" class="btn btn--ghost"><span class="icon icon-house"></span>返回首页</a>
    </div>

    <div class="error-quick-links">
      <p class="error-quick-links__title">您可能在找</p>
      <div class="error-link-grid">
        <a href="/" class="error-quick-link"><span class="icon icon-house"></span><span>首页</span></a>
        <a href="{{ url_for('story.root_collection') }}" class="error-quick-link"><span class="icon icon-book"></span><span>故事</span></a>
        <a href="{{ url_for('game.menu') }}" class="error-quick-link"><span class="icon icon-controller"></span><span>玩具</span></a>
        <a href="{{ url_for('tool.menu') }}" class="error-quick-link"><span class="icon icon-tools"></span><span>工具</span></a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block copyright %}&copy; 2026 聪明山. 迷路了也能找到回家的路。{% endblock %}
