{% extends "base.html" %}
{% block title %}页面未找到 - 404{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-card error-card--animate">
        <p class="error-code">404</p>
        <h1 class="error-title">页面走丢了</h1>
        <p class="error-message">抱歉，您访问的页面似乎在数字世界中迷路了。</p>
        <p class="error-hint">可能是链接已过期、页面已移动，或者您输入的地址有误。不过别担心，我们有很多其他精彩的内容等着您！</p>

        <div class="error-actions">
            <a href="/" class="button-primary">
                <span class="icon icon-house"></span>回到首页
            </a>
            <button onclick="history.back()" class="button-outline">
                <span class="icon icon-arrow-left"></span>返回上页
            </button>
        </div>

        <div class="error-quick-links">
            <p class="error-quick-links__title">您可能在找</p>
            <div class="error-link-grid">
                <a href="/" class="error-quick-link">
                    <span class="icon icon-house"></span>
                    <span>首页</span>
                </a>
                <a href="{{ url_for('story.root_collection') }}" class="error-quick-link">
                    <span class="icon icon-book"></span>
                    <span>故事</span>
                </a>
                <a href="{{ url_for('game.menu') }}" class="error-quick-link">
                    <span class="icon icon-controller"></span>
                    <span>玩具</span>
                </a>
                <a href="{{ url_for('blog.menu') }}" class="error-quick-link">
                    <span class="icon icon-journal-text"></span>
                    <span>博客</span>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
