<!-- 模态框系统组件 -->
{% if current_user.is_authenticated and (current_user.has_admin_rights or current_user.id == blog.author_id) %}
<!-- 点赞者列表 Modal -->
<div class="modal fade" id="likersModal" tabindex="-1" aria-labelledby="likersModalLabel" aria-hidden="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="likersModalLabel">点赞者列表</h5>
        <button type="button" class="btn-close" data-modal-close aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="likers-list" class="list-group" style="max-height: 50vh; overflow: auto;"></div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <button id="likers-prev" class="btn btn-sm btn-outline-secondary">上一页</button>
            <small id="likers-pageinfo" class="text-muted"></small>
            <button id="likers-next" class="btn btn-sm btn-outline-secondary">下一页</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-modal-close>关闭</button>
      </div>
    </div>
  </div>
</div>

<!-- 投喂者列表 Modal -->
<div class="modal fade" id="feedersModal" tabindex="-1" aria-labelledby="feedersModalLabel" aria-hidden="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="feedersModalLabel">🐟 投喂者列表</h5>
        <button type="button" class="btn-close" data-modal-close aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="feeders-list" class="list-group" style="max-height: 50vh; overflow: auto;"></div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <button id="feeders-prev" class="btn btn-sm btn-outline-secondary">上一页</button>
            <small id="feeders-pageinfo" class="text-muted"></small>
            <button id="feeders-next" class="btn btn-sm btn-outline-secondary">下一页</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-modal-close>关闭</button>
      </div>
    </div>
  </div>
</div>

<!-- 删除确认 Modal -->
<div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-labelledby="deleteConfirmLabel" aria-hidden="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteConfirmLabel">确认删除</h5>
        <button type="button" class="btn-close" data-modal-close aria-label="Close"></button>
      </div>
      <div class="modal-body">
        确定要删除这篇文章《{{ blog.title }}》吗？该操作不可恢复。
        {% if current_user.has_admin_rights and current_user.id != blog.author_id %}
        <div class="mt-3">
            <label for="delete-reason" class="form-label">删除原因（管理员必填，将通知作者）：</label>
            <textarea id="delete-reason" class="form-control" rows="3" maxlength="500" placeholder="请填写删除原因…"></textarea>
        </div>
        {% endif %}
      </div>
      <div class="modal-footer">
        <button type="button" class="button button-primary" data-modal-close>取消</button>
        <button type="button" id="confirm-delete-btn" class="button button-warning">确认删除</button>
      </div>
    </div>
  </div>
</div>
{% endif %}
    
<!-- 评论删除确认 Modal -->
<div class="modal fade" id="commentDeleteModal" tabindex="-1" aria-labelledby="commentDeleteLabel" aria-hidden="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="commentDeleteLabel">确认删除评论</h5>
        <button type="button" class="btn-close" data-modal-close aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="text-muted">确定要删除该评论吗？</div>
        <div id="comment-delete-reason-wrap" class="mt-3" style="display:none;">
          <label for="comment-delete-reason" class="form-label">删除原因（管理员必填，将通知用户）：</label>
          <textarea id="comment-delete-reason" class="form-control" rows="3" maxlength="500" placeholder="请填写删除原因…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="button button-primary" data-modal-close>取消</button>
        <button type="button" id="comment-confirm-delete-btn" class="button button-warning">确认删除</button>
      </div>
    </div>
  </div>
</div>

<script src="{{ static_url('js/blog/modal-system.js') }}"></script>
