<!-- 评论系统组件 -->
<div class="blog-detail">
    <section class="comment-section" id="comment-section"
             data-blog-id="{{ blog.id }}"
             data-list-url="{{ url_for('blog.list_comments', blog_id=blog.id) }}"
             data-create-url="{{ url_for('blog.create_comment', blog_id=blog.id) }}"
             data-delete-url-template="{{ url_for('blog.delete_comment', comment_id='__CID__') }}"
             data-can-comment="{{ 1 if current_user.is_authenticated and current_user.is_core_user else 0 }}"
             data-current-user-id="{{ current_user.id if current_user.is_authenticated else '' }}"
             data-is-admin="{{ 1 if current_user.is_authenticated and current_user.has_admin_rights else 0 }}">

        {% if current_user.is_authenticated and current_user.is_core_user %}
        <form class="comment-form" id="comment-form" style="overflow: auto;">
            <textarea name="content" id="comment-content" class="form-control" maxlength="2000" placeholder="说点什么…（最多2000字）"></textarea>
            <div class="mt-2">
                <button type="submit" class="button button-primary" style="margin-top: 10px;">发表评论</button>
            </div>
            <input type="hidden" name="parent_id" id="comment-parent-id" value="">
        </form>
        {% else %}
        <div class="alert alert-info">只有"核心用户"可以发表评论。</div>
        {% endif %}

        <ul class="comment-list" id="comment-list"></ul>
    </section>
</div>

<script src="{{ static_url('js/blog/comment-manager.js') }}"></script>
