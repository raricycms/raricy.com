<!-- 剪贴板预处理组件 -->
<script>
// 剪贴板预处理类
class ClipboardPreprocessor {
    constructor() {
        this.cache = new Map(); // 缓存已获取的内容
    }

    async preprocess(markdownContent) {
        const pattern = /\[@\s*(\w+)\s*\]/g;
        const matches = [...markdownContent.matchAll(pattern)];

        if (matches.length === 0) return markdownContent;

        // 提取所有唯一的 ID
        const uniqueIds = [...new Set(matches.map(match => match[1]))];

        // 批量获取未缓存的内容
        const fetchPromises = uniqueIds
            .filter(id => !this.cache.has(id))
            .map(async (id) => {
                try {
                    const response = await fetch(`/clipboard/${id}?raw`);
                    if (!response.ok) throw new Error(`Failed to fetch ${id}`);

                    const data = await response.json();
                    this.cache.set(id, data.content || '');
                } catch (error) {
                    console.error(`Error fetching clipboard ${id}:`, error);
                    this.cache.set(id, `[Error loading clipboard ${id}]`);
                }
            });

        // 等待所有请求完成
        await Promise.all(fetchPromises);

        // 执行替换
        let processedContent = markdownContent;

        // 为每个匹配项进行替换
        matches.forEach(([fullMatch, id]) => {
            const replacement = this.cache.get(id) || '';
            // 只替换当前匹配项，使用正则避免替换所有相同内容
            processedContent = processedContent.replace(fullMatch, () => replacement);
        });

        return processedContent;
    }

    clearCache() {
        this.cache.clear();
    }
}
</script>
