{# Shared admin Jinja2 macros #}

{# Render a hierarchical category <select> dropdown.
   Args:
     categories: list of Category objects (with .children relationship)
     selected_id: int or None — the currently selected category ID
     include_uncategorized: bool — whether to include an "uncategorized" option
     uncategorized_label: str — label for the uncategorized option
#}
{% macro render_category_options(categories, selected_id=None, include_uncategorized=True, uncategorized_label='设为未分类') %}
    {% if include_uncategorized %}
    <option value="" {{ 'selected' if not selected_id else '' }}>{{ uncategorized_label }}</option>
    {% endif %}
    {% for category in categories %}
    <optgroup label="{{ category.icon }} {{ category.name }}">
        <option value="{{ category.id }}" {{ 'selected' if selected_id == category.id else '' }}>
            {{ category.icon }} {{ category.name }}
        </option>
        {% for child in category.children %}
        <option value="{{ child.id }}" {{ 'selected' if selected_id == child.id else '' }}>
            　└ {{ child.icon }} {{ child.name }}
        </option>
        {% endfor %}
    </optgroup>
    {% endfor %}
{% endmacro %}


{# Render admin pagination.
   Args:
     pagination: Flask-SQLAlchemy Pagination object
     route_name: string — Flask route endpoint name
     extra_params: dict — additional query params preserved across pages
#}
{% macro admin_pagination(pagination, route_name, extra_params={}) %}
    {% if pagination.pages > 1 %}
    <div class="admin-pagination">
        <nav>
            <ul class="pagination">
                {% if pagination.has_prev %}
                <li class="page-item">
                    <a class="page-link" href="{{ url_for(route_name, page=pagination.prev_num, **extra_params) }}">上一页</a>
                </li>
                {% endif %}

                {% for page_num in pagination.iter_pages() %}
                    {% if page_num %}
                        {% if page_num != pagination.page %}
                        <li class="page-item">
                            <a class="page-link" href="{{ url_for(route_name, page=page_num, **extra_params) }}">{{ page_num }}</a>
                        </li>
                        {% else %}
                        <li class="page-item active">
                            <span class="page-link">{{ page_num }}</span>
                        </li>
                        {% endif %}
                    {% else %}
                    <li class="page-item disabled">
                        <span class="page-link">…</span>
                    </li>
                    {% endif %}
                {% endfor %}

                {% if pagination.has_next %}
                <li class="page-item">
                    <a class="page-link" href="{{ url_for(route_name, page=pagination.next_num, **extra_params) }}">下一页</a>
                </li>
                {% endif %}
            </ul>
        </nav>
    </div>
    {% endif %}
{% endmacro %}


{# Render a stat card for admin dashboards.
   Args:
     number: int/string — the stat value
     label: string — label below the number
     variant: string — color variant: blue/green/amber/purple/red
#}
{% macro admin_stat_card(number, label, variant='blue') %}
    <div class="admin-stat-card admin-stat-card--{{ variant }}">
        <div class="admin-stat-card__number">{{ number }}</div>
        <div class="admin-stat-card__label">{{ label }}</div>
    </div>
{% endmacro %}
