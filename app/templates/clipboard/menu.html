{% extends "base.html" %}
{% block title %}云剪贴板 · 聪明山{% endblock %}

{% block content %}
<div class="pwrap">
  <h1 class="ptitle" style="margin:0;">云剪贴板</h1>

  <div class="item-toolbar">
    <div class="search-form" style="max-width:420px;">
      <input type="text" class="search-input" placeholder="请输入目的地编号……" id="target_link">
      <button class="search-btn" id="redirect">前往</button>
    </div>
    <a href="/clipboard/upload" class="upload-button"><span class="icon icon-add"></span>创建剪贴板</a>
  </div>

  {% if clip_lst %}
  <div class="clip-list">
    {% for clip in clip_lst %}
    <a href="./{{ clip['id'] }}" class="card card--link clip-item">
      <span class="clip-item__title">{{ clip["title"] }}</span>
      <span class="clip-item__id">{{ clip["id"] }}</span>
    </a>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty-state">
    <div class="empty-state-icon"><span class="icon icon-clipboard" style="width:2.4rem;height:2.4rem;display:inline-block;"></span></div>
    <h3>还没有剪贴板</h3>
    <p>点击上方按钮创建你的第一个剪贴板。</p>
  </div>
  {% endif %}
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('redirect').addEventListener('click', () => {
        const v = document.getElementById('target_link').value;
        if (v.trim() !== '') window.location.href = './' + encodeURIComponent(v);
        else showToast('目的地不能为空', 'warning');
    });
});
</script>
{% endblock %}
