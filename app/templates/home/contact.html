{% extends "base.html" %}
{% block title %}联系我们 · 聪明山{% endblock %}

{% block content %}
<div class="pwrap pwrap--narrow" style="text-align:center;">
  <h1 class="ptitle ptitle--plain" style="margin:0 0 8px;">联系我们</h1>
  <p class="lede" style="margin-bottom:32px;">遇到问题或有建议？我们随时为您服务。</p>

  <div class="card contact-card" style="text-align:left;">
    <div class="contact-row">
      <span class="contact-row__icon"><span class="icon icon-envelope"></span></span>
      <div>
        <div class="contact-row__label">电子邮件</div>
        <div class="contact-row__value"><a href="mailto:raricycms@gmail.com">raricycms@gmail.com</a></div>
      </div>
    </div>
    <div class="contact-row">
      <span class="contact-row__icon"><span class="icon icon-person"></span></span>
      <div>
        <div class="contact-row__label">微信号</div>
        <div class="contact-row__value">whitealiveautumn0</div>
      </div>
    </div>
    <div class="contact-row">
      <span class="contact-row__icon"><span class="icon icon-github"></span></span>
      <div>
        <div class="contact-row__label">GitHub</div>
        <div class="contact-row__value"><a href="https://github.com/raricycms/raricy.com" target="_blank">项目仓库</a></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block footer_text %}{% endblock %}
