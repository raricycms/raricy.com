{% extends "base.html" %}
{% block title %}邀请码验证 · 聪明山{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="auth-head">
      <h1>邀请码验证</h1>
      <p>输入邀请码即可升级为核心用户</p>
    </div>

    <form id="authentic-form">
      <div class="field">
        <label for="authentic_code">邀请码 <span class="req">*</span></label>
        <input class="input" type="text" id="authentic_code" name="authentic_code" placeholder="请输入您的邀请码" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full" id="submitBtn" style="margin-top:8px;">
        <span id="submitText">立即验证</span>
        <span id="loadingText" style="display:none;">验证中…</span>
      </button>
    </form>

    <p class="auth-alt">没有邀请码？<a href="{{ url_for('home.contact') }}">点击联系我们</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('authentic-form');
    const submitBtn = document.getElementById('submitBtn');
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!form.checkValidity()) { form.reportValidity(); return; }
        submitBtn.disabled = true;
        document.getElementById('submitText').style.display = 'none';
        document.getElementById('loadingText').style.display = 'inline';
        try {
            const response = await fetch('{{ url_for("auth.authentic") }}', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ authentic_code: document.getElementById('authentic_code').value })
            });
            const result = await response.json();
            if (response.ok) {
                showToast(result.message, 'success');
                setTimeout(() => { window.location.href = "{{ url_for('auth.profile', user_id=current_user.id) }}"; }, 1500);
            } else {
                showToast(result.message, 'error');
                document.getElementById('authentic_code').focus();
            }
        } catch (error) {
            showToast('网络错误，请稍后重试', 'error');
        } finally {
            submitBtn.disabled = false;
            document.getElementById('submitText').style.display = 'inline';
            document.getElementById('loadingText').style.display = 'none';
        }
    });
});
</script>
{% endblock %}
