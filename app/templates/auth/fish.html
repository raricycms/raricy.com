{% extends "base.html" %}
{% block title %}小鱼干 · 聪明山{% endblock %}

{% block content %}
<div class="pwrap pwrap--narrow">
  <div class="card fish-card">
    <span class="fish-eyebrow">🐟 我的小鱼干</span>
    <div class="fish-balance">
      <span class="fish-balance__num">{{ "%.4f"|format(dried_fish) }}</span>
      <span class="fish-balance__label">小鱼干余额</span>
    </div>
    {% if today_fish > 0 %}
    <div class="fish-today">今日签到获得 <strong>+{{ today_fish }}</strong></div>
    {% endif %}
    <div style="margin-top:24px;">
      <a class="btn btn--ghost arrow" href="{{ url_for('auth.fish_transactions') }}">查看流水</a>
    </div>
    <p class="fish-info">每日签到可获得小鱼干，更多获取方式即将开放…</p>
  </div>
</div>
{% endblock %}
