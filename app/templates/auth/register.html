{% extends "base.html" %}
{% block title %}用户注册 · 聪明山{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="auth-head">
      <h1>用户注册</h1>
      <p>请填写以下信息完成注册</p>
    </div>

    <form id="registerForm">
      <div class="field">
        <label for="inviteCode">邀请码 <span class="opt">(可选)</span></label>
        <input class="input" type="text" id="inviteCode" name="invite_code" placeholder="请输入邀请码（可选）">
        <div class="field-hint">邀请码也可以在之后填写。如果你需要邀请码，可以去<a href="/contact" target="_blank">这里</a>获取。</div>
      </div>
      <div class="field">
        <label for="username">用户名 <span class="req">*</span></label>
        <input class="input" type="text" id="username" name="username" placeholder="请输入用户名" required minlength="3" maxlength="20">
      </div>
      <div class="field">
        <label for="email">邮箱 <span class="req">*</span></label>
        <input class="input" type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
      </div>
      <div class="field">
        <label for="password">密码 <span class="req">*</span></label>
        <input class="input" type="password" id="password" name="password" placeholder="请输入密码" required minlength="6">
      </div>
      <div class="field">
        <label for="confirmPassword">确认密码 <span class="req">*</span></label>
        <input class="input" type="password" id="confirmPassword" name="confirm_password" placeholder="请再次输入密码" required>
      </div>

      {{ turnstile }}

      <div class="field">
        <label class="check-row">
          <input type="checkbox" id="agreeTerms" required>
          <span>我已阅读并同意 <a href="{{ url_for('home.terms') }}" target="_blank">用户协议</a> 和 <a href="{{ url_for('home.privacy') }}" target="_blank">隐私政策</a></span>
        </label>
      </div>

      <button type="submit" class="btn btn--primary btn--full" id="submitBtn" style="margin-top:8px;">
        <span id="submitText">立即注册</span>
        <span id="loadingText" style="display:none;">注册中…</span>
      </button>
    </form>

    <p class="auth-alt">已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const loadingText = document.getElementById('loadingText');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');

        function validatePassword() {
            confirmPassword.setCustomValidity(password.value !== confirmPassword.value ? '两次输入的密码不一致' : '');
        }
        password.addEventListener('input', validatePassword);
        confirmPassword.addEventListener('input', validatePassword);

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            if (!form.checkValidity()) { form.reportValidity(); return; }

            submitBtn.disabled = true;
            submitText.style.display = 'none';
            loadingText.style.display = 'inline';

            const data = Object.fromEntries(new FormData(form));
            if (!data.invite_code || data.invite_code.trim() === '') { delete data.invite_code; }
            try {
                const response = await fetch('{{ url_for("auth.register") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message || '注册成功！正在跳转到登录页面...', 'success');
                    setTimeout(() => { window.location.href = '{{ url_for("auth.login") }}'; }, 1800);
                } else {
                    showToast(result.message || '注册失败，请检查输入信息', 'error');
                    if (result.field === 'invite_code') { document.getElementById('inviteCode').focus(); }
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitText.style.display = 'inline';
                loadingText.style.display = 'none';
            }
        });
    });
</script>
{% endblock %}
