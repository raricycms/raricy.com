{% extends "base.html" %}
{% block title %}用户登录 · 聪明山{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="auth-head">
      <h1>用户登录</h1>
      <p>请填写以下信息完成登录</p>
    </div>

    <form id="loginForm">
      <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
      <div class="field">
        <label for="username">用户名</label>
        <input class="input" type="text" id="username" name="username" placeholder="请输入用户名" required>
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input class="input" type="password" id="password" name="password" placeholder="请输入密码" required minlength="6">
      </div>
      <button type="submit" class="btn btn--primary btn--full" id="submitBtn" style="margin-top:8px;">
        <span id="submitText">立即登录</span>
        <span id="loadingText" style="display:none;">登录中…</span>
      </button>
    </form>

    <p class="auth-alt">没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const loadingText = document.getElementById('loadingText');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            if (!form.checkValidity()) { form.reportValidity(); return; }

            submitBtn.disabled = true;
            submitText.style.display = 'none';
            loadingText.style.display = 'inline';

            const data = Object.fromEntries(new FormData(form));
            try {
                const response = await fetch('{{ url_for("auth.login") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message || '登录成功！正在跳转...', 'success');
                    setTimeout(() => { window.location.href = result.redirect_url || '/'; }, 1200);
                } else {
                    showToast(result.message || '登录失败，请检查用户名和密码', 'error');
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitText.style.display = 'inline';
                loadingText.style.display = 'none';
            }
        });
    });
</script>
{% endblock %}
